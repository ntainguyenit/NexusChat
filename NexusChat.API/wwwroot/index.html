<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusChat</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <!-- Login View -->
        <div id="login-view" class="view active">
            <div class="login-card">
                <div class="brand">
                    <i class="fa-solid fa-bolt brand-icon"></i>
                    <h1>NexusChat</h1>
                </div>
                <p class="subtitle">Enter your credentials to continue</p>
                <form id="login-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" value="alice" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" value="Pa$$w0rd" required>
                    </div>
                    <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
                    <p id="login-error" class="error-msg"></p>
                </form>
            </div>
        </div>

        <!-- Chat View -->
        <div id="chat-view" class="view">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2>Conversations</h2>
                    <div>
                        <button class="icon-btn" title="Join Group" onclick="document.getElementById('join-modal').classList.add('active')"><i class="fa-solid fa-users-viewfinder"></i></button>
                        <button class="icon-btn" title="New Group"><i class="fa-solid fa-pen-to-square"></i></button>
                    </div>
                </div>
                <div class="search-bar">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" placeholder="Search...">
                </div>
                <ul class="conversation-list" id="conversation-list">
                    <!-- Dynamic conversations will be loaded here -->
                    <li class="conversation-item active">
                        <div class="avatar"><i class="fa-solid fa-user"></i></div>
                        <div class="conv-details">
                            <span class="conv-name">General Room</span>
                            <span class="conv-last-msg">Welcome to NexusChat</span>
                        </div>
                    </li>
                </ul>
                <div class="sidebar-footer">
                    <div class="current-user">
                        <div class="avatar small"><i class="fa-solid fa-user"></i></div>
                        <span id="current-username">User</span>
                    </div>
                    <button class="icon-btn" id="logout-btn" title="Sign Out"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </aside>

            <!-- Main Chat Area -->
            <main class="chat-area">
                <header class="chat-header">
                    <div class="chat-title">
                        <h2 id="active-chat-name">General Room</h2>
                        <span class="status-indicator online" title="Online"></span>
                    </div>
                    <div class="chat-actions">
                        <div class="message-search-bar" id="message-search-bar" style="display: none; margin-right: 10px;">
                            <input type="text" id="message-search-input" placeholder="Tìm kiếm..." style="padding: 4px 8px; border-radius: 12px; border: 1px solid #ccc;">
                        </div>
                        <button class="icon-btn" title="View Join Code" id="view-code-btn" style="display: none;"><i class="fa-solid fa-qrcode"></i></button>
                        <button class="icon-btn" title="Members" id="members-btn" style="display: none;"><i class="fa-solid fa-users"></i></button>
                        <button class="icon-btn" title="Pending Requests" id="pending-requests-btn" style="display: none; position: relative;"><i class="fa-solid fa-bell"></i><span id="pending-badge" class="pending-badge" style="display: none;">0</span></button>
                        <button class="icon-btn" title="Rename Group" id="rename-group-btn" style="display: none;"><i class="fa-solid fa-pen"></i></button>
                        <button class="icon-btn" title="Search in chat" id="toggle-search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
                        <button class="icon-btn" title="Leave Group" id="leave-group-btn" style="display: none; color: #e67e22;"><i class="fa-solid fa-right-from-bracket"></i></button>
                        <button class="icon-btn" title="Disband Group" id="disband-btn" style="display: none; color: #e74c3c;"><i class="fa-solid fa-trash-can"></i></button>
                        <button class="icon-btn" title="Settings"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                    </div>
                </header>

                <div class="messages-container" id="messages-container">
                    <!-- Dynamic messages -->
                    <div class="message system">
                        <span>Connected to chat server</span>
                    </div>
                </div>
                
                <div id="typing-indicator" class="typing-indicator"></div>

                <div id="edit-indicator" class="edit-indicator" style="display: none;"></div>

                <footer class="chat-footer">
                    <div class="input-wrapper" style="margin-left: 0;">
                        <input type="text" id="message-input" placeholder="Nhập tin nhắn..." autocomplete="off">
                    </div>
                    <button class="icon-btn send-btn" id="send-btn" title="Gửi tin nhắn"><i class="fa-solid fa-paper-plane"></i></button>
                </footer>
            </main>
        </div>
    </div>

    <!-- Modals -->
    <div id="settings-modal" class="modal">
        <div class="modal-content" style="max-width: 480px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h3 style="margin-bottom: 0;"><i class="fa-solid fa-gear" style="color: var(--primary); margin-right: 8px;"></i>Cài đặt</h3>
                <button class="icon-btn" onclick="document.getElementById('settings-modal').classList.remove('active')" title="Đóng"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="settings-section">
                <h4><i class="fa-solid fa-user"></i> Hồ sơ</h4>
                <div class="form-group">
                    <label for="setting-username">Tên người dùng</label>
                    <input type="text" id="setting-username" placeholder="Username">
                </div>
                <div class="form-group">
                    <label for="setting-email">Email</label>
                    <input type="email" id="setting-email" placeholder="Email">
                </div>
                <button class="btn-primary small" id="save-profile-btn"><i class="fa-solid fa-floppy-disk"></i> Lưu hồ sơ</button>
            </div>
            
            <hr style="border: none; border-top: 1px solid var(--border); margin: 1.2rem 0;">
            
            <div class="settings-section">
                <h4><i class="fa-solid fa-lock"></i> Đổi mật khẩu</h4>
                <div class="form-group">
                    <label for="current-password">Mật khẩu hiện tại</label>
                    <input type="password" id="current-password" placeholder="Mật khẩu hiện tại">
                </div>
                <div class="form-group">
                    <label for="new-password">Mật khẩu mới</label>
                    <input type="password" id="new-password" placeholder="Mật khẩu mới">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Xác nhận mật khẩu mới</label>
                    <input type="password" id="confirm-password" placeholder="Xác nhận mật khẩu">
                </div>
                <button class="btn-primary small" id="save-password-btn"><i class="fa-solid fa-key"></i> Đổi mật khẩu</button>
            </div>
            
            <div class="modal-footer">
                <button class="btn-secondary" onclick="document.getElementById('settings-modal').classList.remove('active')">Đóng</button>
            </div>
        </div>
    </div>
    
    <div id="group-modal" class="modal">
        <div class="modal-content">
            <h3 id="group-modal-title">New Group</h3>
            <div class="form-group" id="group-name-group">
                <label>Group Name</label>
                <input type="text" id="group-name" placeholder="E.g. Project Team">
            </div>
            <div id="group-code-display" style="display: none; margin-top: 15px; padding: 15px; background: rgba(52, 152, 219, 0.1); border-radius: 8px; text-align: center; border: 1px dashed var(--primary);">
                <p style="margin-bottom: 8px; color: var(--text-secondary); font-size: 0.9rem;">Share this Join Code with others:</p>
                <h2 id="new-group-code" style="letter-spacing: 4px; color: var(--primary); font-size: 2rem; margin: 0;"></h2>
                <button class="btn-secondary small" id="copy-code-btn" style="margin-top: 15px; width: 100%;"><i class="fa-solid fa-copy"></i> Copy Code</button>
                <button class="btn-primary small" onclick="closeGroupModal()" style="margin-top: 10px; width: 100%;">Close / Thoát</button>
            </div>
            <div class="modal-footer" id="group-modal-footer">
                <button class="btn-secondary" onclick="closeGroupModal()">Cancel</button>
                <button class="btn-primary small" id="create-group-btn">Create</button>
            </div>
        </div>
    </div>

    <div id="join-modal" class="modal">
        <div class="modal-content">
            <h3>Join Group</h3>
            <div class="form-group">
                <label>Enter Group Code</label>
                <input type="text" id="join-code" placeholder="E.g. X7A9KQ">
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="document.getElementById('join-modal').classList.remove('active')">Cancel</button>
                <button class="btn-primary small" id="join-group-btn">Join</button>
            </div>
        </div>
    </div>

    <div id="pending-requests-modal" class="modal">
        <div class="modal-content" style="max-width: 480px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h3 style="margin-bottom: 0;"><i class="fa-solid fa-user-clock" style="color: var(--primary); margin-right: 8px;"></i>Yêu cầu tham gia</h3>
                <button class="icon-btn" onclick="document.getElementById('pending-requests-modal').classList.remove('active')" title="Đóng"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="pending-requests-list" class="pending-requests-list">
                <!-- Dynamic pending requests -->
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="document.getElementById('pending-requests-modal').classList.remove('active')">Đóng</button>
            </div>
        </div>
    </div>
    <!-- Members Modal -->
    <div id="members-modal" class="modal">
        <div class="modal-content" style="max-width: 480px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h3 style="margin-bottom: 0;"><i class="fa-solid fa-users" style="color: var(--primary); margin-right: 8px;"></i>Thành viên</h3>
                <button class="icon-btn" onclick="document.getElementById('members-modal').classList.remove('active')" title="Đóng"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="members-list" class="pending-requests-list"></div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="document.getElementById('members-modal').classList.remove('active')">Đóng</button>
            </div>
        </div>
    </div>

    <!-- Rename Group Modal -->
    <div id="rename-group-modal" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <h3><i class="fa-solid fa-pen" style="color: var(--primary); margin-right: 8px;"></i>Đổi tên nhóm</h3>
            <div class="form-group">
                <label>Tên nhóm mới</label>
                <input type="text" id="rename-group-input" placeholder="Nhập tên mới...">
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="document.getElementById('rename-group-modal').classList.remove('active')">Hủy</button>
                <button class="btn-primary small" id="rename-group-save">Lưu</button>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <!-- SignalR Client -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <!-- Custom JS -->
    <script src="app.js"></script>
</body>
</html>
